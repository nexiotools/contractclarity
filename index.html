    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Hoe kan ik mijn arbeidscontract laten analyseren?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Upload je arbeidscontract als PDF in ContractClarity, of plak de tekst direct in de tool. De AI analyseert elke clausule, legt uit wat het betekent in gewone taal, geeft een risicoscore en vergelijkt met de Nederlandse of Franse arbeidsregelgeving."
          }
        },
        {
          "@type": "Question",
          "name": "Wat is een non-concurrentiebeding en is het geldig?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Een non-concurrentiebeding verbiedt je om na je dienstverband bij een concurrent te werken. In Nederland moet het schriftelijk zijn overeengekomen en proportioneel zijn. ContractClarity signaleert automatisch of jouw non-concurrentiebeding voldoet aan de wettelijke eisen."
          }
        },
        {
          "@type": "Question",
          "name": "Welk arbeidsrecht gebruikt ContractClarity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ContractClarity ondersteunt zowel het Nederlandse arbeidsrecht (Burgerlijk Wetboek Boek 7) als het Franse arbeidsrecht (Code du travail). Je kiest de taal bovenin de tool en de AI past automatisch de juiste wetgeving toe."
          }
        },
        {
          "@type": "Question",
          "name": "Is ContractClarity juridisch advies?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nee. ContractClarity geeft een indicatieve analyse op basis van algemene arbeidsrechtprincipes. Het vervangt geen advies van een jurist of advocaat. Voor specifieke juridische vragen raden wij aan een specialist te raadplegen."
          }
        },
        {
          "@type": "Question",
          "name": "Wat controleer ik in mijn arbeidscontract voordat ik teken?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Controleer minimaal: de duur van de proeftijd (max. 2 maanden in Nederland), het non-concurrentiebeding, het relatiebeding, overurenbeleid, opzegtermijnen en eventuele boeteclausules. ContractClarity controleert al deze clausules automatisch en geeft een risicoscore per onderdeel."
          }
        }
      ]
    }
    </script>
